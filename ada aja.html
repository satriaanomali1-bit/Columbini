<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Columbina</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            /* Menggunakan gradasi pink yang sama dengan website utamamu */
            background: linear-gradient(to right, #ffb6c1, #ffc0cb, #ffd1dc);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Membuat kotak pas di tengah layar laptop/HP */
        }

        .box-gateway {
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            /* Bayangan dengan nuansa deeppink tipis */
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.2);
            text-align: center;
            width: 320px;
            border: 2px solid #ffd1dc;
        }

        h2 {
            color: deeppink;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid pink;
            border-radius: 8px;
            outline: none;
            text-align: center;
            font-size: 16px;
            color: #555;
            transition: border-color 0.3s;
        }

        /* Efek saat kolom password diklik */
        input[type="password"]:focus {
            border-color: hotpink;
        }

        button {
            background-color: hotpink;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: deeppink; /* Warna menggelap saat disentuh kursor */
        }

        .pesan-error {
            color: #c71585; /* Warna medium violet red untuk teks error */
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            display: none; /* Tersembunyi di awal */
        }
    </style>
</head>
<body>

<div class="box-gateway">
    <h2>❤️ Area Terbatas ❤️</h2>
    <p>Silahkan masukkan password pw yang benar terkebih dahulu.</p>
    
    <input type="password" id="inputPassword" placeholder="Masukkan pw password anda">
    <button onclick="cekPassword()">Masuk</button>
    
    <div id="error" class="pesan-error">Salah Idiott</div>
</div>

<script>
    function cekPassword() {
        var passwordYgBenar = "aku cinta zahra"; // <<< GANTI KALIMAT RAHASIAMU DI SINI
        var inputUser = document.getElementById("inputPassword").value;
        var teksError = document.getElementById("error");

        if (inputUser === passwordYgBenar) {
            // Jika benar, masuk ke halaman utama yang ada galeri & tabelnya
            window.location.href = "home.html"; 
        } else {
            // Jika salah, munculkan peringatan
            teksError.style.display = "block";
        }
    }

    // Biar bisa submit pakai tombol 'Enter' di keyboard
    document.getElementById("inputPassword").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            cekPassword();
        }
    });
</script>

</body>
</html>
