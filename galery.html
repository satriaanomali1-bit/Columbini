<!DOCTYPE html>

<title>Galeri Foto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6ea,#fff0f7);
    padding:20px;
}

h1{
    text-align:center;
    color:#d63384;
    margin-bottom:10px;
}

.counter{
    text-align:center;
    color:#a61e63;
    margin-bottom:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.foto{
    width:100%;
    height:250px;
    object-fit:cover;
    cursor:pointer;
}

.caption{
    text-align:center;
    padding:10px;
    color:#d63384;
    font-weight:bold;
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:85%;
    border-radius:15px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

</style>
</head>

<script>

const lightbox = document.getElementById("lightbox");
const preview = document.getElementById("preview");

photos.forEach(photo => {

    photo.addEventListener("click", () => {

        preview.src = photo.src;
        lightbox.style.display = "flex";

});

lightbox.addEventListener("click", () => {

    lightbox.style.display = "none";

});
